<div class="min-vh-100 d-flex flex-column align-items-center justify-content-center"
  style="background: linear-gradient(135deg, #1a237e 0%, #b71c1c 100%);">

  <!-- Logo CEUTEC -->
  <div class="text-center mb-4">
    <img src="https://portal.unitec.edu/Documentos/2025/CEUTEC/Logos/BLANCOS/Vertical%20Blanco.png" alt="Logo CEUTEC"
      class="img-fluid" style="max-width: 180px;" />
  </div>

  <!-- Card -->
  <div class="card shadow-lg border-0" style="width: 100%; max-width: 420px;">

    <div class="card-header text-white text-center py-3 border-0"  style="background: linear-gradient(135deg, #1a237e 0%, #b71c1c 100%);">
      <h5 class="fw-bold mb-1">Inicio de Sesión</h5>
      <p class="mb-0 small" style="opacity: 0.75;">Ingresa con tu cuenta institucional</p>
    </div>

    <div class="card-body px-4 py-4">

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label text-muted small fw-semibold" style="letter-spacing:0.05em;">
          CORREO INSTITUCIONAL
        </label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor" class="text-muted">
              <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
              <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
            </svg>
          </span>
          <input id="email" type="email" class="form-control border-start-0" [(ngModel)]="email"
            placeholder="correo@ceutec.edu" autocomplete="email" />
        </div>
      </div>

      <!-- Contraseña -->
      <div class="mb-4">
        <label for="password" class="form-label text-muted small fw-semibold" style="letter-spacing:0.05em;">
          CONTRASEÑA
        </label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor" class="text-muted">
              <path fill-rule="evenodd"
                d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                clip-rule="evenodd" />
            </svg>
          </span>
          <input id="password" type="password" class="form-control border-start-0" [(ngModel)]="password"
            placeholder="Ingrese su contraseña" autocomplete="current-password" />
        </div>
      </div>

      <!-- Error -->
      <div *ngIf="error" class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3" role="alert">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
            clip-rule="evenodd" />
        </svg>
        <span class="small">{{ error }}</span>
      </div>

      <!-- Botón -->
      <button class="btn w-100 text-white fw-semibold btn-ingresar" (click)="login()"
        style="background: #b71c1c; letter-spacing: 0.08em;">
        INGRESAR
      </button>

    </div>
  </div>

  <!-- Footer -->
  <p class="small mt-4" style="color: rgba(255,255,255,0.5); letter-spacing:0.05em;">
    Elecciones Estudiantiles {{ currentYear }}
  </p>

</div>
