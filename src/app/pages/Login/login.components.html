<div class="login-container">

  <!-- Fondo animado con partículas decorativas -->
  <div class="bg-overlay"></div>
  <div class="particles">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <!-- Logo / Header institucional -->
  <div class="login-header">
    <div class="logo-badge">
      <img src="/assets/logo.png" alt="Logo sistema" />
    </div>
    <h1 class="system-title">Sistema de Votaciones</h1>
  </div>

  <!-- Card del formulario -->
  <div class="login-card">
    <div class="card-inner">
      <h2>Inicio de Sesión</h2>
      <p class="subtitle">Ingresa con tu cuenta institucional</p>

      <div class="field-group">
        <label for="email">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
          Correo institucional
        </label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          placeholder="correo&#64;ceutec.edu"
          autocomplete="email"
        />
      </div>

      <div class="field-group">
        <label for="password">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
          Contraseña
        </label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          placeholder="Ingrese su contraseña"
          autocomplete="current-password"
        />
      </div>

      <button class="btn-login" (click)="login()">
        <span>Ingresar</span>
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
      </button>

      <p class="error" *ngIf="error">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        {{ error }}
      </p>
    </div>
  </div>

  <p class="footer-note">Elecciones Estudiantiles {{ currentYear }}</p>
</div>
