<div class="min-vh-100 d-flex flex-column align-items-center justify-content-center"
     style="background: linear-gradient(135deg, #1a237e 0%, #b71c1c 100%);">

  <!-- Logo -->
  <div class="text-center mb-4">
    <img src="https://portal.unitec.edu/Documentos/2025/CEUTEC/Logos/BLANCOS/Vertical%20Blanco.png"
         alt="CEUTEC – Centro Universitario Tecnológico"
         class="img-fluid"
         style="max-width:180px;"
         width="180" />
  </div>

  <!-- Card -->
  <div class="card shadow-lg border-0" style="width:100%; max-width:420px;">

    <div class="card-header text-white text-center py-3 border-0"
         style="background: linear-gradient(135deg, #1a237e 0%, #b71c1c 100%);">
      <h1 class="h5 fw-bold mb-1">Inicio de Sesión</h1>
      <p class="mb-0 small" style="opacity:.85;">Ingresa con tu cuenta institucional</p>
    </div>

    <div class="card-body px-4 py-4">

      <!-- Región aria-live para errores -->
      <div role="alert" aria-live="assertive" aria-atomic="true">
        <div *ngIf="error"
             class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"
               aria-hidden="true" focusable="false">
            <path fill-rule="evenodd"
              d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
              clip-rule="evenodd"/>
          </svg>
          <span class="small">{{ error }}</span>
        </div>
      </div>

      <form (ngSubmit)="login()" aria-label="Formulario de inicio de sesión" novalidate>

        <!-- Correo -->
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold small text-dark"
                 style="letter-spacing:.05em;">CORREO INSTITUCIONAL</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"
                   class="text-muted" focusable="false">
                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
              </svg>
            </span>
            <input id="email" name="email" type="email"
                   class="form-control border-start-0"
                   [(ngModel)]="email"
                   placeholder="correo@ceutec.edu"
                   autocomplete="email"
                   required aria-required="true"
                   [attr.aria-invalid]="error ? 'true' : null" />
          </div>
        </div>

        <!-- Contraseña -->
        <div class="mb-4">
          <label for="password" class="form-label fw-semibold small text-dark"
                 style="letter-spacing:.05em;">CONTRASEÑA</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"
                   class="text-muted" focusable="false">
                <path fill-rule="evenodd"
                  d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                  clip-rule="evenodd"/>
              </svg>
            </span>
            <input id="password" name="password" type="password"
                   class="form-control border-start-0"
                   [(ngModel)]="password"
                   placeholder="Ingrese su contraseña"
                   autocomplete="current-password"
                   required aria-required="true"
                   [attr.aria-invalid]="error ? 'true' : null" />
          </div>
        </div>

        <!-- Botón submit -->
        <button type="submit"
                class="btn w-100 text-white fw-semibold"
                style="background:#b71c1c; letter-spacing:.08em;"
                [disabled]="cargando"
                [attr.aria-busy]="cargando ? 'true' : null"
                aria-label="Ingresar al sistema de elecciones">
          <span *ngIf="!cargando">INGRESAR</span>
          <span *ngIf="cargando">
            <span class="spinner-border spinner-border-sm me-2"
                  role="status" aria-hidden="true"></span>
            Ingresando…
          </span>
        </button>

      </form>
    </div>
  </div>

  <footer class="mt-4 text-center">
    <p class="small mb-0" style="color:rgba(255,255,255,.75); letter-spacing:.05em;">
      Elecciones Estudiantiles {{ currentYear }}
    </p>
  </footer>

</div>
